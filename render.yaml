services:
  - type: web
    name: freefire-integrado-render
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: RELEASE_VERSION
        value: OB51
      - key: PUBLIC_URL
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: BR_CONFIG
        sync: false
      - key: IND_CONFIG
        sync: false
      - key: EUROPE_CONFIG
        sync: false
